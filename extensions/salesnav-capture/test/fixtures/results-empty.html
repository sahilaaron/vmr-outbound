<!DOCTYPE html>
<!-- Legitimately empty search: an explicit no-results state, zero rows.
     Extraction must report status "empty" (NOT structure_unrecognized, NOT a
     successful capture). -->
<html lang="en">
  <head><meta charset="UTF-8" /><title>Sales Navigator — Results</title></head>
  <body>
    <main>
      <div class="search-results-container">
        <div class="artdeco-empty-state" data-test-search-no-results>
          <h2>No results found</h2>
          <p>Try a different search or adjust your filters.</p>
        </div>
      </div>
    </main>
  </body>
</html>
