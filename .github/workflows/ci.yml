name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: vmr_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # No secrets: local CI database only. Postgres 16 default encoding is UTF8.
      DATABASE_URL: postgresql+psycopg://dev:dev@127.0.0.1:5433/vmr_dev
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: python -m mypy app

      - name: Alembic migrations apply cleanly
        run: alembic upgrade head

      - name: Alembic has no un-generated changes
        run: alembic check

      - name: Alembic migration round trip (downgrade then re-upgrade)
        # Proves every migration is reversible before migration volume grows.
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Pytest
        run: python -m pytest
